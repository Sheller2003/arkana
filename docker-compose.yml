services:
  arkana-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arkana-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ARKANA_API_HOST: 0.0.0.0
      ARKANA_API_PORT: 8000
      ARKANA_SESSIONS_ROOT: ${ARKANA_SESSIONS_ROOT:-/app/arkana_spheres}
    ports:
      - "${ARKANA_API_PORT:-8000}:8000"
    volumes:
      - ${ARKANA_SESSIONS_ROOT:-./arkana_spheres}:${ARKANA_SESSIONS_ROOT:-/app/arkana_spheres}
      - ./keyring_data:/app/.local/share/python_keyring
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
