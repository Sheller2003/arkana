services:
  arkana-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arkana-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ARKANA_API_HOST: 0.0.0.0
      ARKANA_API_PORT: 8000
    ports:
      - "${ARKANA_API_PORT:-8000}:8000"
    volumes:
      - ./arkana_spheres:/app/arkana_spheres
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
